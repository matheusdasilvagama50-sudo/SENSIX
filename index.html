<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensi Pro - Gerador Oficial</title>
<style>
*{ box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
body{ margin:0; height:100vh; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; overflow: hidden; }

/* FUNDO ANIMADO */
#canvas-bg { position:fixed; top:0; left:0; z-index:0; }

.panel{ 
 position:relative; z-index:2; width:95%; max-width:450px; 
 background:rgba(8, 8, 8, 0.98); border: 1px solid #333; 
 border-radius:30px; padding:40px; text-align: center;
 box-shadow: 0 0 50px rgba(0,0,0,0.9); transition: 0.5s;
}

.hidden { display: none; }

h2 { font-size: 1.8rem; margin-bottom: 5px; font-weight: 800; }
p { font-size: 0.9rem; color: #777; margin-bottom: 30px; }

/* INPUTS E SELECTS */
input, select { 
 width: 100%; padding: 16px; margin-top: 15px; border-radius: 12px; 
 border: 1px solid #444; background: #0c0c0c; color: #fff; outline: none; font-size: 15px;
}
input::placeholder { color: #444; }

/* BOTÕES */
.btn-group { display: flex; gap: 10px; margin-top: 25px; }
.btn-opt { 
 flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #444;
 background: #111; color: #fff; cursor: pointer; font-size: 12px; transition: 0.3s;
}
.btn-opt.active { background: #fff; color: #000; border-color: #fff; font-weight: bold; }

#btnMain { 
 width: 100%; padding: 18px; margin-top: 30px; border-radius: 15px;
 border: none; background: #fff; color: #000; font-weight: 900; cursor: pointer; font-size: 17px;
 text-transform: uppercase;
}

/* RESULTADO */
.result-box {
 margin-top: 30px; padding: 25px; background: rgba(255, 255, 255, 0.02);
 border: 1px solid #222; border-radius: 20px; text-align: left; display: none;
 animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes slideUp { from { opacity:0; transform: translateY(30px); } to { opacity:1; transform: translateY(0); } }

.result-box div { margin: 12px 0; font-size: 15px; color: #bbb; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
.result-box b { color: #fff; float: right; font-size: 16px; }

.high-val { color: #ff3e3e !important; text-shadow: 0 0 10px rgba(255,62,62,0.5); }
.dpi-txt { color: #00ff99 !important; font-weight: bold; border: none !important; }

#btnCopiar {
 width: 100%; padding: 14px; margin-top: 20px; border-radius: 12px;
 border: 2px solid #fff; background: transparent; color: #fff; 
 font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.3s;
}
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<!-- TELA DE LOGIN -->
<div class="panel" id="login-screen">
    <h2>Acesso Restrito</h2>
    <p>Insira sua chave para acessar o gerador</p>
    <input type="password" id="access-key" placeholder="CHAVE DE ACESSO">
    <button id="btnMain" onclick="validarAcesso()">Entrar no Sistema</button>
</div>

<!-- TELA PRINCIPAL (OCULTA) -->
<div class="panel hidden" id="main-screen">
    <h2>Configurações</h2>
    <p>Ajuste sua sensibilidade de hardware</p>

    <select id="marca" onchange="carregarModelos()">
        <option value="">Selecione a Marca</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="Samsung">Samsung</option>
        <option value="Apple">iPhone (iOS)</option>
        <option value="Motorola">Motorola</option>
        <option value="Realme">Realme</option>
        <option value="Infinix">Infinix</option>
        <option value="Huawei">Huawei</option>
        <option value="Oppo">Oppo</option>
        <option value="Vivo">Vivo</option>
    </select>

    <select id="modelo">
        <option value="">Selecione o Modelo</option>
    </select>

    <div class="btn-group">
        <button class="btn-opt" onclick="setNivel('Baixa', this)">Sensi Baixa</button>
        <button class="btn-opt active" onclick="setNivel('Média', this)">Sensi Média</button>
        <button class="btn-opt" onclick="setNivel('Alta', this)">Sensi Alta</button>
    </div>

    <button id="btnMain" onclick="gerarSensi()">Gerar Configuração</button>

    <div class="result-box" id="result">
        <div>Modelo: <b id="resMod">--</b></div>
        <div>Geral: <b id="resGeral" class="high-val">--</b></div>
        <div>Red Dot: <b id="resRed" class="high-val">--</b></div>
        <div>Mira 2x: <b id="res2x" class="high-val">--</b></div>
        <div>Mira 4x: <b id="res4x" class="high-val">--</b></div>
        <div>Botão de Tiro: <b id="resBtn">--</b></div>
        <div class="dpi-txt">DPI Recomendada: <b id="resDpi" class="dpi-txt">--</b></div>
        <button id="btnCopiar" onclick="copiarSensi()">Copiar Sensibilidade</button>
    </div>
</div>

<script>
let nivelSelecionado = "Média";
const CHAVE_OFICIAL = "GERADORFF2026V1";

const bancoDados = {
    "Xiaomi": ["Poco X5 Pro", "Poco F5", "Redmi Note 12", "Redmi Note 13", "Poco X3 Pro", "Xiaomi 13 Ultra", "Redmi 12", "Black Shark 5"],
    "Samsung": ["S24 Ultra", "S23 FE", "A54 5G", "A34", "A14", "S20 FE", "M54", "A73", "S21 Ultra", "Note 20 Ultra"],
    "Apple": ["iPhone 15 Pro Max", "iPhone 14 Plus", "iPhone 13 Pro", "iPhone 12 Mini", "iPhone 11 Pro", "iPhone XR", "iPhone 8 Plus", "iPhone 15"],
    "Motorola": ["Edge 40 Neo", "Moto G84", "Moto G54", "Edge 30 Ultra", "Moto G73", "Moto G200", "Razr 40 Ultra"],
    "Realme": ["Realme C67", "Realme 11 Pro+", "Realme GT3", "Realme C55", "Realme 10 Pro"],
    "Infinix": ["Note 30 Pro", "Hot 40 Pro", "Zero 30", "Smart 8"],
    "Huawei": ["P60 Pro", "Mate 50", "Nova 11 Pro"],
    "Oppo": ["Find X6 Pro", "Reno 10", "A78"],
    "Vivo": ["X100 Pro", "V29", "Y78"]
};

function validarAcesso() {
    const key = document.getElementById('access-key').value;
    if(key === CHAVE_OFICIAL) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    } else {
        alert("CHAVE INCORRETA!");
    }
}

function carregarModelos() {
    const marca = document.getElementById('marca').value;
    const select = document.getElementById('modelo');
    select.innerHTML = '<option value="">Selecione o Modelo</option>';
    if(marca) {
        bancoDados[marca].sort().forEach(m => {
            select.innerHTML += `<option value="${m}">${m}</option>`;
        });
    }
}

function setNivel(nivel, el) {
    nivelSelecionado = nivel;
    document.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
}

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1) + min); }

function gerarSensi() {
    const mod = document.getElementById('modelo').value;
    if(!mod) return alert("Selecione o dispositivo!");
    
    let g, r, m2, m4, btn, dpi;
    if(nivelSelecionado === "Baixa") { g=rand(98,105); r=rand(95,102); m2=rand(90,98); m4=rand(88,95); btn=58; dpi=520; }
    else if(nivelSelecionado === "Média") { g=rand(106,118); r=rand(103,112); m2=rand(99,108); m4=rand(96,105); btn=48; dpi=680; }
    else { g=rand(120,150); r=rand(115,140); m2=rand(110,135); m4=rand(105,130); btn=38; dpi=980; }

    document.getElementById('resMod').innerText = mod;
    document.getElementById('resGeral').innerText = g;
    document.getElementById('resRed').innerText = r;
    document.getElementById('res2x').innerText = m2;
    document.getElementById('res4x').innerText = m4;
    document.getElementById('resBtn').innerText = btn + "%";
    document.getElementById('resDpi').innerText = dpi;
    document.getElementById('result').style.display = 'block';
}

function copiarSensi() {
    const mod = document.getElementById('resMod').innerText;
    const g = document.getElementById('resGeral').innerText;
    const r = document.getElementById('resRed').innerText;
    const m2 = document.getElementById('res2x').innerText;
    const m4 = document.getElementById('res4x').innerText;
    const btn = document.getElementById('resBtn').innerText;
    const dpi = document.getElementById('resDpi').innerText;

    const texto = `🎯 *SENSIBILIDADE ATUALIZADA* 🎯

📱 *DISPOSITIVO:* ${mod}
⚡ *INTENSIDADE:* ${nivelSelecionado}

▬▬▬▬▬▬▬▬▬▬▬▬▬▬
🔘 *GERAL:* ${g}
🔴 *RED DOT:* ${r}
🔭 *MIRA 2X:* ${m2}
🔬 *MIRA 4X:* ${m4}
▬▬▬▬▬▬▬▬▬▬▬▬▬▬

⚙️ *DPI:* ${dpi}
🎮 *BOTÃO:* ${btn}

✅ *CONFIGURAÇÃO APLICADA*`;

    navigator.clipboard.writeText(texto).then(() => {
        const b = document.getElementById('btnCopiar');
        b.innerText = "COPIADO! ✅";
        setTimeout(() => b.innerText = "Copiar Sensibilidade", 2000);
    });
}

/* BACKGROUND ANIMADO */
const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let w, h, p = [];
function init() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; p=[]; for(let i=0;i<90;i++) p.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6}); }
function draw() { ctx.clearRect(0,0,w,h); ctx.fillStyle="rgba(255,255,255,0.2)"; ctx.strokeStyle="rgba(255,255,255,0.05)"; p.forEach((i,idx)=>{ i.x+=i.vx; i.y+=i.vy; if(i.x<0||i.x>w)i.vx*=-1; if(i.y<0||i.y>h)i.vy*=-1; ctx.beginPath(); ctx.arc(i.x,i.y,1.5,0,Math.PI*2); ctx.fill(); for(let j=idx+1;j<p.length;j++){ let d=Math.hypot(i.x-p[j].x,i.y-p[j].y); if(d<120){ ctx.beginPath(); ctx.moveTo(i.x,i.y); ctx.lineTo(p[j].x,p[j].y); ctx.stroke(); } } }); requestAnimationFrame(draw); }
window.onresize=init; init(); draw();
</script>
</body>
</html>
