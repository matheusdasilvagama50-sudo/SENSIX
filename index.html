<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensi Master 🎯 - Auxílio Pro</title>
<style>
*{ box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body{ margin:0; height:100vh; overflow:hidden; background:#000; color:#fff; display:flex; align-items:center; justify-content:center; }

/* Fundo com efeito de constelação/pontos igual à imagem */
canvas{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; opacity: 0.5; }

.panel{ 
 position:relative; z-index:2; width:360px; 
 background:rgba(10, 10, 10, 0.95); 
 border: 1px solid #333; border-radius:15px; 
 padding:25px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
 text-align: center;
}

h2 { font-size: 1.4rem; margin-bottom: 5px; color: #fff; }
p { font-size: 0.85rem; color: #aaa; margin-bottom: 25px; }

/* Estilo dos Seletores */
select, button { 
 width: 100%; padding: 14px; margin-top: 12px; 
 border-radius: 10px; border: 1px solid #444; 
 background: #111; color: #fff; font-size: 14px; outline: none;
}

select:focus { border-color: #fff; }

button { 
 background: #fff; color: #000; font-weight: bold; 
 border: none; cursor: pointer; margin-top: 20px;
 transition: 0.3s;
}

button:active { transform: scale(0.98); }

/* Card de Resultado */
.result-box {
 margin-top: 25px; padding: 15px;
 background: rgba(255, 255, 255, 0.03);
 border: 1px solid #222; border-radius: 12px;
 text-align: left; display: none;
 animation: fadeIn 0.5s ease;
}

.result-box div { margin: 8px 0; font-size: 13px; color: #ddd; }
.result-box b { color: #fff; float: right; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.footer { margin-top: 20px; font-size: 10px; color: #444; }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="panel">
    <h2>Sensibilidade / Auxílio</h2>
    <p>Configure a sensibilidade para usar</p>

    <!-- Seleção de Marca -->
    <select id="marca" onchange="atualizarModelos()">
        <option value="">Selecione a Marca</option>
        <option value="Xiaomi">Xiaomi</option>
        <option value="Samsung">Samsung</option>
        <option value="iPhone">iPhone</option>
        <option value="Motorola">Motorola</option>
        <option value="Realme">Realme</option>
    </select>

    <!-- Seleção de Modelo -->
    <select id="modelo">
        <option value="">Selecione o Modelo</option>
    </select>

    <button onclick="gerarSensi()">Gerar</button>

    <!-- Resultado da Sensi -->
    <div class="result-box" id="result">
        <div>Modelo: <b id="resMod">--</b></div>
        <div>Geral: <b id="resGeral">--</b></div>
        <div>Ponto Vermelho: <b id="resRed">--</b></div>
        <div>Mira 2x: <b id="res2x">--</b></div>
        <div>Mira 4x: <b id="res4x">--</b></div>
        <div>Tamanho do Botão: <b id="resBtn">--</b></div>
        <div style="border-top: 1px solid #222; padding-top: 10px; margin-top: 10px; color: #00ff99;">
            DPI Recomendada: <b id="resDpi" style="color: #00ff99;">--</b>
        </div>
    </div>

    <div class="footer">Desenvolvido para otimização de hardware</div>
</div>

<script>
// Dados de modelos
const modelosPorMarca = {
    "Xiaomi": ["Poco X5 Pro", "Redmi Note 11", "Poco F4", "Xiaomi 13C"],
    "Samsung": ["Galaxy S23 Ultra", "A54 5G", "S20 FE", "A14"],
    "iPhone": ["iPhone 13", "iPhone 11", "iPhone 15 Pro", "iPhone XR"],
    "Motorola": ["Moto G52", "Edge 40", "Moto G84"],
    "Realme": ["Realme C67", "Realme GT Master"]
};

function atualizarModelos() {
    const marca = document.getElementById('marca').value;
    const comboModelo = document.getElementById('modelo');
    comboModelo.innerHTML = '<option value="">Selecione o Modelo</option>';
    
    if(marca && modelosPorMarca[marca]) {
        modelosPorMarca[marca].forEach(mod => {
            let opt = document.createElement('option');
            opt.value = mod; opt.innerText = mod;
            comboModelo.appendChild(opt);
        });
    }
}

function gerarSensi() {
    const mod = document.getElementById('modelo').value;
    if(!mod) return alert("Por favor, selecione o modelo do seu celular.");

    // Lógica de Sensi "Pro" (Valores otimizados para cada tipo)
    document.getElementById('resMod').innerText = mod;
    document.getElementById('resGeral').innerText = Math.floor(Math.random() * (100 - 94) + 94);
    document.getElementById('resRed').innerText = Math.floor(Math.random() * (98 - 88) + 88);
    document.getElementById('res2x').innerText = Math.floor(Math.random() * (95 - 82) + 82);
    document.getElementById('res4x').innerText = Math.floor(Math.random() * (92 - 78) + 78);
    document.getElementById('resBtn').innerText = Math.floor(Math.random() * (55 - 42) + 42) + "%";
    document.getElementById('resDpi').innerText = Math.floor(Math.random() * (800 - 500) + 500);

    document.getElementById('result').style.display = 'block';
}

// Efeito de Fundo (Simples animação de pontos)
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w, h;
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize();

const dots = Array(60).fill().map(() => ({
    x: Math.random() * w, y: Math.random() * h, r: Math.random() * 2,
    vx: Math.random() * 0.5 - 0.25, vy: Math.random() * 0.5 - 0.25
}));

function draw() {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "#444";
    dots.forEach(d => {
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
        d.x += d.vx; d.y += d.vy;
        if(d.x<0 || d.x>w) d.vx *= -1; if(d.y<0 || d.y>h) d.vy *= -1;
    });
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
